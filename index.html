<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>101 Okey KaaN</title>
    <style>
        body { background-color: #006400; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .masa { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; box-sizing: border-box; }
        .istaka { 
            background: #4e2a07; 
            border: 4px solid #331a04; 
            border-radius: 10px; 
            height: 140px; 
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 4px;
            padding: 8px;
        }
        .tas { 
            background: #fdfdfd; 
            color: #000; 
            border-radius: 4px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 16px;
            height: 55px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .kirmizi { color: #d32f2f; }
        .mavi { color: #1976d2; }
        .siyah { color: #000; }
        .sari { color: #fbc02d; }
    </style>
</head>
<body>
    <div class="masa">
        <h3 style="margin-top: 5px;">🀄 101 OKEY KaaN 🀄</h3>
        <div style="font-size: 20px;">Okey: 🔵5</div>
        <div class="istaka">
            <div class="tas kirmizi">1</div><div class="tas kirmizi">2</div><div class="tas kirmizi">3</div>
            <div class="tas mavi">11</div><div class="tas siyah">13</div><div class="tas sari">5</div>
            <div class="tas">🃏</div><div class="tas"></div><div class="tas"></div><div class="tas"></div><div class="tas"></div>
        </div>
    </div>
</body>
  </html>
